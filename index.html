<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SocialSpark - Social Media Content Generator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <div class="app-card">
      <div class="header">
        <h1>SocialSpark</h1>
        <p>Create ready-to-post social media content in seconds.</p>
      </div>

      <div class="form-group">
        <label for="topic">Topic</label>
        <textarea id="topic" placeholder="Example: New coffee shop opening in Dubai"></textarea>
      </div>

      <div class="grid">
        <div class="form-group">
          <label for="platform">Platform</label>
          <select id="platform">
            <option value="instagram">Instagram</option>
            <option value="linkedin">LinkedIn</option>
            <option value="twitter">X / Twitter</option>
          </select>
        </div>

        <div class="form-group">
          <label for="tone">Tone</label>
          <select id="tone">
            <option value="professional">Professional</option>
            <option value="friendly">Friendly</option>
            <option value="bold">Bold</option>
            <option value="funny">Funny</option>
          </select>
        </div>
      </div>

      <div class="actions">
        <button id="generateBtn" onclick="generateContent()">Generate Content</button>
        <button id="copyBtn" class="secondary-btn" onclick="copyContent()">Copy Output</button>
      </div>

      <div class="output-card">
        <div class="output-header">
          <h2>Generated Content</h2>
          <span id="statusMessage"></span>
        </div>
        <div id="output">Your generated content will appear here.</div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
